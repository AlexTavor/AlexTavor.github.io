<!doctype html>
<html lang="en">
  <head>

    <title>pdd · plan snapshot</title>
    <style>
:root {
  --bg: #0e1116;
  --panel: #161b22;
  --panel-2: #1c2230;
  --border: #2a3140;
  --text: #d7dee8;
  --dim: #7d8694;
  --accent: #4c8eff;
  --red: #f06363;
  --amber: #e0a64b;
  --green: #54b87a;
  --grey: #5a6573;
  --p0: #4c8eff;
  --p1: #a78bfa;
  --p2: #e0795a;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
}
.dim { color: var(--dim); }

.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 18px; border-bottom: 1px solid var(--border); background: var(--panel);
}
.brand { font-weight: 700; letter-spacing: .2px; }
.repo { font-family: var(--mono); font-size: 12px; }
.progress { font-size: 12px; font-variant-numeric: tabular-nums; }
.now { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; background: var(--panel-2); border: 1px solid var(--accent); border-radius: 12px; padding: 2px 10px; }
.now-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
.now-id { font-family: var(--mono); font-weight: 600; color: var(--accent); }
.now-evt { color: var(--dim); }
.seam { margin-left: auto; background: var(--panel-2); border: 1px solid var(--border); color: var(--dim); border-radius: 6px; padding: 3px 10px; font: inherit; font-size: 12px; cursor: pointer; }
.seam:hover { border-color: var(--accent); color: var(--text); }
.seam-out { font-size: 11px; font-family: var(--mono); }
.conn { width: 8px; height: 8px; border-radius: 50%; background: var(--grey); transition: background .3s; }
.conn.live { background: var(--green); }
.conn.down { background: var(--red); }

/* controls */
.controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 10px 18px; border-bottom: 1px solid var(--border); background: var(--panel); }
.ctl-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--dim); }
.chips { display: inline-flex; gap: 6px; }
.chip { background: var(--panel-2); border: 1px solid var(--border); color: var(--dim); border-radius: 14px; padding: 3px 10px; font: inherit; font-size: 12px; cursor: pointer; }
.chip:hover { border-color: var(--accent); color: var(--text); }
.chip.active { background: var(--accent); color: #08111f; border-color: var(--accent); font-weight: 600; }
.legend { display: inline-flex; align-items: center; gap: 12px; margin-left: auto; font-size: 11px; color: var(--dim); }
.legend span { display: inline-flex; align-items: center; gap: 5px; }
.legend .sep { color: var(--border); }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.r-low { background: var(--green); } .dot.r-med { background: var(--amber); } .dot.r-high { background: var(--red); }
.sw { width: 12px; height: 10px; border-radius: 2px; display: inline-block; border: 1px solid var(--border); }
.sw.st-done { background: var(--green); } .sw.st-inprog { background: var(--accent); } .sw.st-todo { background: transparent; }

/* plan health (cycles / dangling deps) */
.health { margin: 0; padding: 8px 18px; background: rgba(240,99,99,.10); border-bottom: 1px solid var(--red); color: #ffb4b4; font-size: 12px; font-family: var(--mono); }

/* layout */
.layout { display: grid; grid-template-columns: minmax(420px, 1.7fr) minmax(300px, 1fr); gap: 1px; background: var(--border); height: calc(100vh - 99px); }
.gantt-pane, .detail-pane { background: var(--bg); overflow: auto; padding: 12px 16px; }
.pane-title { font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: var(--dim); margin: 2px 0 12px; font-weight: 600; }

/* axis */
.axis { display: grid; grid-template-columns: 210px 1fr; font-size: 11px; color: var(--dim); margin-bottom: 6px; }

/* gantt */
.gantt { --colw: 8%; }
.sech { font-size: 13px; font-weight: 600; margin: 16px 0 6px; display: flex; gap: 8px; align-items: center; }
.sech:first-child { margin-top: 0; }
.sech .pc { width: 11px; height: 11px; border-radius: 3px; flex: none; }
.sech .cnt { font-size: 12px; color: var(--dim); font-weight: 400; }
.row { display: grid; grid-template-columns: 210px 1fr; align-items: center; height: 30px; border-radius: 6px; cursor: pointer; }
.row:hover { background: var(--panel); }
.row.sel { background: var(--panel-2); outline: 1px solid var(--accent); }
.row.dep .bar { box-shadow: 0 0 0 2px var(--accent); }
.row.enb .bar { box-shadow: 0 0 0 2px var(--grey); }
.lab { display: flex; align-items: center; gap: 6px; overflow: hidden; padding: 0 10px 0 2px; }
.lab .dot { flex: none; }
.rid { font-family: var(--mono); font-weight: 600; font-size: 12px; flex: none; width: 30px; }
.ttl { font-size: 12px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track { position: relative; height: 100%; background: repeating-linear-gradient(90deg, var(--border) 0 1px, transparent 1px, transparent var(--colw)); }
.bar {
  position: absolute; top: 50%; transform: translateY(-50%); height: 16px; min-width: 16px;
  border: 1px solid var(--grey); background: transparent; border-radius: 8px;
  display: flex; align-items: center; justify-content: flex-end; gap: 4px; padding: 0 6px;
  border-left-width: 4px;
}
.bar.st-done { background: rgba(84,184,122,.22); border-color: var(--green); }
.bar.st-inprog { background: rgba(76,142,255,.22); border-color: var(--accent); }
.bar.st-blocked { background: rgba(240,99,99,.20); border-color: var(--red); }
.bar.cp { border-color: var(--accent); }
.bar.active { animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
.star { font-size: 9px; color: var(--accent); margin-right: auto; }
.szl { font-size: 9px; color: var(--dim); }

/* detail pane */
.detail { display: flex; flex-direction: column; gap: 8px; }
.empty { color: var(--dim); }
.d-head { display: flex; align-items: baseline; gap: 8px; }
.d-head .rid { width: auto; }
.d-title { font-size: 15px; font-weight: 600; }
.bdgs { display: flex; gap: 6px; flex-wrap: wrap; }
.bdg { font-size: 11px; border: 1px solid var(--border); border-radius: 10px; padding: 1px 8px; color: var(--dim); }
.kv { display: grid; grid-template-columns: 96px 1fr; gap: 10px; padding: 6px 0; border-top: 1px solid var(--border); font-size: 13px; }
.kl { font-size: 12px; color: var(--dim); }
.goid { font-family: var(--mono); background: var(--panel); border: 1px solid var(--border); color: var(--accent); border-radius: 6px; padding: 1px 7px; font-size: 12px; cursor: pointer; margin: 0 4px 4px 0; }
.goid:hover { border-color: var(--accent); }

/* overview (default detail) */
.ov-sec { margin-top: 6px; }
.ov-phase { border-left: 3px solid var(--border); padding: 4px 0 4px 10px; margin: 8px 0; }
.ov-phase.p-P0 { border-color: var(--p0); } .ov-phase.p-P1 { border-color: var(--p1); } .ov-phase.p-P2 { border-color: var(--p2); }
.ov-phase .pn { font-weight: 600; font-size: 13px; }
.ov-phase .pg, .ov-phase .px { font-size: 12px; color: var(--dim); margin-top: 2px; }
.ov-dec { font-size: 12px; padding: 5px 0; border-top: 1px solid var(--border); }
.ov-dec .dq { color: var(--dim); }
.sec-head { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--dim); margin: 12px 0 4px; }


/* snapshot-only cosmetics */
.snap { margin-left: auto; font-size: 11px; color: var(--dim); border: 1px solid var(--border); border-radius: 10px; padding: 1px 8px; }
.conn { display: none; }
    </style>

to; reads the .pdd/.run/ slices, no port-hopping to the findings dashboard."},{"id":"W29","title":"Launch MAP from the dashboard (request -> session/CLI drives)","phase":"P1.5","track":"HITL","depends_on":["W28","W7"],"size":"M","risk":"med","status":"done","critical":true,"agentic":false,"note":"A 'Map this project' control records a map-request via the W7 seam (the CLI is the writer); a deterministic provider runs autonomously, the real atlas is driven by the session; either way it streams into W28's view."},{"id":"W30","title":"Operator sign-off -> finalize the remediation map","phase":"P1.5","track":"HITL","depends_on":["W28","W17"],"size":"M","risk":"low","status":"done","critical":true,"agentic":false,"note":"An explicit 'review complete' action (enabled once every unit is triaged) freezes the curated roadmap as Phase 1's output + the Phase-2 handoff; a replayable ledger sign-off entry, not a quietly-derived GREEN."},{"id":"W31","title":"Re-sweep prove/grade post-fix (extend the gate beyond check-class)","phase":"P2","track":"REMEDIATE","depends_on":["W27"],"size":"M","risk":"med","status":"pending","critical":false,"agentic":false,"note":"Today the re-sweep gate re-runs only `pdd check`, so a unit whose open findings are all prove/grade/atlas-class can never auto-certify green and parks at needs-hitl by design (P2-5 surfaces this precisely). This increment re-runs prove/grade inside the worktree behind the same ReSweep seam, so such a unit can reach landed once it is built."}],"graph":{"depth":{"W1":0,"W2":0,"W3":1,"W4":2,"W5":3,"W6":4,"W7":1,"W8":1,"W9":2,"W10":1,"W11":2,"W12":3,"W13":4,"W14":5,"W15":6,"W16":7,"W17":7,"W18":8,"W19":8,"W20":1,"W21":1,"W22":0,"W23":2,"W24":1,"W25":3,"W26":4,"W27":5,"W28":9,"W29":10,"W30":10,"W31":6},"order":["W1","W2","W22","W10","W20","W21","W24","W3","W7","W8","W11","W23","W4","W9","W12","W25","W5","W13","W26","W6","W14","W27","W15","W31","W16","W17","W18","W19","W28","W29","W30"],"warnings":[]},"progress":{"version":1,"activeItemId":null,"lastEvent":"W27 done","updatedAt":"2026-06-17T19:02:53.177Z","statuses":{},"ring":[{"id":"W27","status":"done","at":"2026-06-17T19:02:53.177Z","note":null},{"id":"W27","status":"active","at":"2026-06-17T17:37:27.678Z","note":null},{"id":"W26","status":"done","at":"2026-06-16T01:58:05.593Z","note":null},{"id":"W25","status":"done","at":"2026-06-16T01:39:44.017Z","note":null},{"id":"W24","status":"done","at":"2026-06-16T00:16:44.775Z","note":null},{"id":"W23","status":"done","at":"2026-06-15T23:30:24.751Z","note":null},{"id":"W22","status":"done","at":"2026-06-15T23:19:41.846Z","note":null},{"id":"W21","status":"done","at":"2026-06-15T16:14:20.893Z","note":null},{"id":"W21","status":"active","at":"2026-06-15T16:09:05.192Z","note":"remediation/status.json writer + dashboard surface"},{"id":"W20","status":"done","at":"2026-06-15T14:11:42.477Z","note":null},{"id":"W20","status":"active","at":"2026-06-15T14:08:00.814Z","note":"Phase 2 start: remediation roadmap reader + per-unit state helpers"},{"id":"W30","status":"done","at":"2026-06-15T00:00:36.828Z","note":null},{"id":"W29","status":"done","at":"2026-06-15T00:00:36.585Z","note":null},{"id":"W28","status":"done","at":"2026-06-14T21:08:47.833Z","note":null},{"id":"W19","status":"done","at":"2026-06-14T17:37:31.623Z","note":null},{"id":"W18","status":"done","at":"2026-06-13T17:56:38.918Z","note":"W18: approve/deny/edit wired + informed via dossier"},{"id":"W16","status":"done","at":"2026-06-13T17:56:38.782Z","note":"W16 redesign: roadmap rendered + comprehensible dossier"},{"id":"W16","status":"active","at":"2026-06-13T12:31:53.146Z","note":"render the roadmap + wire approve/deny/edit on the plan dashboard"},{"id":"W17","status":"done","at":"2026-06-13T12:31:52.941Z","note":"HITL gate: pdd roadmap + decision ledger shipped (PR #15)"},{"id":"W17","status":"active","at":"2026-06-13T11:15:57.823Z","note":"HITL decision ledger + pdd roadmap write-command"},{"id":"W15","status":"done","at":"2026-06-13T11:15:57.746Z","note":"CARVE → units.json shipped (PR #14)"},{"id":"W14","status":"done","at":"2026-06-12T20:08:31.786Z","note":"classification: write-back + gate + map run + mock provider, observable, mock-tested"},{"id":"W13","status":"done","at":"2026-06-12T20:08:31.631Z","note":"atlas authoring: mock author + full-MAP orchestrator + observable, mock-tested"}]},"repo":"proof-driven-development"};</script>
    <script>
// pdd plan — pure viewer. Polls the read-only server and renders the build plan as a gantt
// (x = DAG build-order depth, width = effort, fill = status) + dependency highlight on
// select. No framework, no build. Mirrors the findings dashboard's h()/poll() conventions.
// W6: when .pdd/plan-progress.json sets an activeItemId, the poll speeds up and the active
// bar pulses — the build plan becomes a live progress view.
"use strict";

const POLL_RUN = 750;
const POLL_IDLE = 1500;
const SIZE_U = { S: 1, M: 1.7, L: 2.6 };
const PC = { P0: "#4c8eff", P1: "#a78bfa", P2: "#e0795a" };

const state = { sel: null, phase: "all", cpOnly: false };
let lastData = null;
let byId = {};
let enablesMap = {};
let nextPoll = POLL_IDLE;

// --- tiny safe hyperscript: children are strings (-> text nodes) or Nodes ---
function h(tag, attrs, ...kids) {
  const e = document.createElement(tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k === "class") e.className = v;
    else if (k === "onclick") e.addEventListener("click", v);
    else if (k === "title") e.title = v;
    else e.setAttribute(k, v === true ? "" : String(v));
  }
  for (const kid of kids.flat()) {
    if (kid == null || kid === false) continue;
    e.appendChild(typeof kid === "string" || typeof kid === "number" ? document.createTextNode(String(kid)) : kid);
  }
  return e;
}
const $ = (id) => document.getElementById(id);

async function getJson(url) {
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

function indexData(data) {
  byId = {};
  enablesMap = {};
  for (const it of data.items || []) byId[it.id] = it;
  for (const it of data.items || []) for (const d of it.depends_on || []) (enablesMap[d] = enablesMap[d] || []).push(it.id);
}

function statusClass(s) {
  if (s === "done" || s === "landed") return "st-done";
  if (s === "blocked") return "st-blocked";
  if (s && s !== "not-started") return "st-inprog"; // in-progress, in-cycle, planning, …
  return "";
}

// --- gantt ---
function rowNode(it, depth, colW, active) {
  const lp = (depth[it.id] || 0) * colW;
  let wp = (SIZE_U[it.size] || 1) * colW;
  if (lp + wp > 99) wp = 99 - lp;
  const sel = state.sel;
  const isDep = sel && byId[sel] && (byId[sel].depends_on || []).includes(it.id);
  const isEnb = sel && (enablesMap[sel] || []).includes(it.id);
  const barCls = ["bar", statusClass(it.status), it.critical ? "cp" : "", active === it.id ? "active" : ""].join(" ");
  return h("div", { class: ["row", isDep ? "dep" : "", isEnb ? "enb" : "", sel === it.id ? "sel" : ""].join(" "), onclick: () => select(it.id) },
    h("div", { class: "lab" },
      h("i", { class: "dot r-" + (it.risk || "low") }),
      h("span", { class: "rid" }, it.id),
      h("span", { class: "ttl", title: it.title }, it.title),
    ),
    h("div", { class: "track" },
      h("div", { class: barCls, style: `left:${lp.toFixed(2)}%;width:${wp.toFixed(2)}%;border-left-color:${PC[it.phase] || "var(--grey)"}` },
        it.critical ? h("span", { class: "star" }, "★") : null,
        h("span", { class: "szl" }, it.size),
      ),
    ),
  );
}

function renderGantt(data) {
  if (!data) return;
  if (!data.items || !data.items.length) {
    $("gantt").replaceChildren(h("p", { class: "empty" }, `No plan items here (reading ${data.repo || "?"}/.pdd/). Run pdd plan from a repo whose .pdd/ has a plan.json.`));
    return;
  }
  const depth = (data.graph && data.graph.depth) || {};
  const maxD = Math.max(0, ...Object.values(depth));
  const colW = 100 / (maxD + 3);
  const host = $("gantt");
  host.style.setProperty("--colw", colW.toFixed(3) + "%");
  const active = data.progress && data.progress.activeItemId;
  const phases = data.phases && data.phases.length ? data.phases : [...new Set((data.items || []).map((i) => i.phase))].map((id) => ({ id, name: "" }));
  const nodes = [];
  for (const ph of phases) {
    if (state.phase !== "all" && state.phase !== ph.id) continue;
    const items = (data.items || []).filter((it) => it.phase === ph.id && (!state.cpOnly || it.critical));
    if (!items.length) continue;
    items.sort((a, b) => (depth[a.id] || 0) - (depth[b.id] || 0) || a.id.localeCompare(b.id));
    const done = items.filter((x) => x.status === "done").length;
    nodes.push(h("div", { class: "sech" },
      h("i", { class: "pc", style: `background:${PC[ph.id] || "var(--grey)"}` }),
      `Phase ${String(ph.id).replace(/^P/, "")} · ${ph.name || ""}`,
      h("span", { class: "cnt" }, `${done}/${items.length}`),
    ));
    for (const it of items) nodes.push(rowNode(it, depth, colW, active));
  }
  if (!nodes.length) nodes.push(h("p", { class: "empty" }, "no items match this filter"));
  host.replaceChildren(...nodes);
}

// --- detail pane ---
const goid = (id) => h("span", { class: "goid", onclick: () => goto(id) }, id);

function detailItem(it) {
  const deps = it.depends_on || [];
  const enb = enablesMap[it.id] || [];
  return [
    h("div", { class: "d-head" }, h("span", { class: "rid" }, it.id), h("span", { class: "d-title" }, it.title)),
    h("div", { class: "bdgs" },
      h("span", { class: "bdg" }, it.phase),
      h("span", { class: "bdg" }, it.track),
      h("span", { class: "bdg" }, "size " + it.size),
      h("span", { class: "bdg" }, (it.risk || "") + " risk"),
      h("span", { class: "bdg" }, it.status),
      it.critical ? h("span", { class: "bdg" }, "★ critical path") : null,
      it.agentic ? h("span", { class: "bdg" }, "agentic") : null,
    ),
    h("div", { class: "kv" }, h("div", { class: "kl" }, "deliverable"), h("div", {}, it.note || "—")),
    h("div", { class: "kv" }, h("div", { class: "kl" }, "depends on"), h("div", {}, deps.length ? deps.map(goid) : h("span", { class: "dim" }, "none — startable now"))),
    h("div", { class: "kv" }, h("div", { class: "kl" }, "unblocks"), h("div", {}, enb.length ? enb.map(goid) : h("span", { class: "dim" }, "none — a leaf"))),
  ];
}

function detailOverview(data) {
  const done = (data.items || []).filter((i) => i.status === "done").length;
  const nodes = [
    h("div", {}, h("div", { class: "d-title" }, data.title || "build plan"), h("div", { class: "dim", style: "font-size:12px" }, `${(data.items || []).length} items · ${done} done · click any bar`)),
    h("div", { class: "sec-head" }, "phases"),
    ...(data.phases || []).map((p) => h("div", { class: "ov-phase p-" + p.id },
      h("div", { class: "pn" }, `${p.id} · ${p.name || ""}`),
      p.goal ? h("div", { class: "pg" }, "goal: " + p.goal) : null,
      p.exit_criteria ? h("div", { class: "px" }, "exit: " + p.exit_criteria) : null,
    )),
  ];
  if ((data.decisions || []).length) {
    nodes.push(h("div", { class: "sec-head" }, "locked decisions"));
    for (const d of data.decisions) nodes.push(h("div", { class: "ov-dec" }, h("span", { class: "dq" }, d.decision + " → "), d.choice));
  }
  return nodes;
}

function renderDetail(it) {
  $("detail-title").textContent = it ? it.id : "overview";
  $("detail").replaceChildren(...(it ? detailItem(it) : lastData ? detailOverview(lastData) : [h("p", { class: "empty" }, "loading…")]));
}

function select(id) {
  state.sel = state.sel === id ? null : id;
  renderGantt(lastData);
  renderDetail(state.sel ? byId[state.sel] : null);
}
function goto(id) {
  state.sel = id;
  renderGantt(lastData);
  renderDetail(byId[id]);
}

// --- controls ---
function renderPhaseChips(data) {
  const ids = ["all", ...(data.phases || []).map((p) => p.id)];
  $("phase-chips").replaceChildren(
    ...ids.map((id) => h("button", { class: "chip" + (state.phase === id ? " active" : ""), onclick: () => { state.phase = id; renderGantt(lastData); renderPhaseChips(lastData); } }, id)),
  );
}
$("cp-toggle").addEventListener("click", () => {
  state.cpOnly = !state.cpOnly;
  $("cp-toggle").classList.toggle("active", state.cpOnly);
  renderGantt(lastData);
});

// W6/live: the "now building X" indicator, driven by the .pdd/plan-progress.json overlay.
function renderNow(progress) {
  const host = $("now");
  if (!progress || !progress.activeItemId) {
    host.hidden = true;
    return;
  }
  host.hidden = false;
  host.replaceChildren(
    h("span", { class: "now-dot" }),
    h("span", { class: "now-id" }, progress.activeItemId),
    progress.lastEvent ? h("span", { class: "now-evt" }, progress.lastEvent) : null,
  );
}

function renderHealth(warnings) {
  const host = $("health");
  if (!warnings || !warnings.length) { host.hidden = true; return; }
  const cyc = warnings.filter((w) => w.type === "cycle").map((w) => w.id);
  const dang = warnings.filter((w) => w.type === "dangling").map((w) => `${w.id}→${w.missing}`);
  host.hidden = false;
  host.textContent = "⚠ plan graph: " +
    [cyc.length ? `cycle at ${[...new Set(cyc)].join(", ")}` : "", dang.length ? `dangling dep ${[...new Set(dang)].join(", ")}` : ""].filter(Boolean).join(" · ");
}

// --- snapshot render (one-shot; the live build serves this same payload from /api/plan) ---
function render(data) {
  lastData = data;
  indexData(data);
  $("repo").textContent = data.repo || "";
  const done = (data.items || []).filter((i) => i.status === "done").length;
  $("progress").textContent = `${done}/${(data.items || []).length} done`;
  renderNow(data.progress);
  renderHealth((data.graph && data.graph.warnings) || []);
  renderPhaseChips(data);
  renderGantt(data);
  renderDetail(state.sel ? byId[state.sel] : null);
}
render(window.__PLAN__);

    </script>
  </body>
